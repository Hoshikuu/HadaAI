    <title>📌 TaskBoard</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0d1117;
        --bg2: #161b22;
        --bg3: #1c2128;
        --bg4: #22272e;
        --border: #30363d;
        --text: #e6edf3;
        --text2: #8d96a0;
        --blue: #388bfd;
        --red: #f85149;
        --green: #3fb950;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Navbar ── */
      .navbar {
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        padding: 0 20px;
        height: 54px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }
      .logo {
        font-size: 17px;
        font-weight: 700;
        white-space: nowrap;
      }
      .logo span {
        color: var(--blue);
      }
      .search-wrap {
        position: relative;
        flex: 1;
        max-width: 300px;
      }
      .search-wrap input {
        width: 100%;
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 12px 6px 30px;
        color: var(--text);
        font-size: 13px;
        outline: none;
        transition: border-color 0.15s;
      }
      .search-wrap input:focus {
        border-color: var(--blue);
      }
      .search-wrap::before {
        content: "🔍";
        position: absolute;
        left: 8px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 11px;
        pointer-events: none;
      }
      .stats {
        display: flex;
        gap: 8px;
        margin-left: auto;
      }
      .badge {
        font-size: 12px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 20px;
      }
      .badge-total {
        background: #30363d;
        color: var(--text2);
      }
      .badge-curso {
        background: rgba(245, 158, 11, 0.15);
        color: #f59e0b;
      }
      .badge-done {
        background: rgba(16, 185, 129, 0.15);
        color: #10b981;
      }
      .btn-new {
        background: var(--blue);
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 7px 14px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        transition: background 0.15s;
        white-space: nowrap;
      }
      .btn-new:hover {
        background: #1d6fe8;
      }

      /* ── Board ── */
      .board {
        display: flex;
        gap: 14px;
        padding: 16px 20px;
        flex: 1;
        overflow-x: auto;
        align-items: flex-start;
      }

      /* ── Column ── */
      .column {
        background: var(--bg2);
        border-radius: 10px;
        flex: 1;
        min-width: 270px;
        max-width: 380px;
        display: flex;
        flex-direction: column;
        max-height: calc(100vh - 54px - 32px);
      }
      .col-head {
        padding: 12px 14px 10px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 8px;
        border-radius: 10px 10px 0 0;
        flex-shrink: 0;
      }
      .col-icon {
        font-size: 15px;
      }
      .col-title {
        font-size: 13px;
        font-weight: 700;
        flex: 1;
        letter-spacing: 0.03em;
      }
      .col-count {
        font-size: 11px;
        background: var(--bg4);
        padding: 2px 8px;
        border-radius: 20px;
        color: var(--text2);
        font-weight: 700;
      }
      .col-pendiente .col-head {
        border-top: 3px solid #ef4444;
      }
      .col-en_curso .col-head {
        border-top: 3px solid #f59e0b;
      }
      .col-completada .col-head {
        border-top: 3px solid #10b981;
      }
      .col-body {
        padding: 10px;
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-height: 56px;
      }
      .col-add {
        margin: 4px 10px 10px;
        background: transparent;
        border: 1.5px dashed var(--border);
        border-radius: 8px;
        padding: 8px;
        color: var(--text2);
        font-size: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        transition: all 0.15s;
        flex-shrink: 0;
      }
      .col-add:hover {
        background: var(--bg3);
        color: var(--text);
        border-style: solid;
      }
      .col-empty {
        text-align: center;
        color: var(--text2);
        font-size: 12px;
        padding: 20px 10px;
        opacity: 0.5;
        pointer-events: none;
      }

      /* ── Card ── */
      .card {
        background: var(--bg3);
        border-radius: 8px;
        padding: 11px 12px;
        border-left: 4px solid var(--cc, #3b82f6);
        cursor: grab;
        transition:
          transform 0.15s,
          box-shadow 0.15s,
          background 0.15s;
        user-select: none;
      }
      .card:hover {
        background: var(--bg4);
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
      }
      .card:active {
        cursor: grabbing;
      }
      .card-ghost {
        opacity: 0.35;
      }
      .card-chosen {
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
        transform: rotate(0.8deg);
      }
      .card-name {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 5px;
        word-break: break-word;
        line-height: 1.4;
      }
      .card-meta {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 5px;
        align-items: center;
      }
      .card-tag {
        font-size: 11px;
        padding: 2px 7px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.07);
        color: var(--text2);
      }
      .card-due {
        font-size: 11px;
        color: var(--text2);
        display: flex;
        align-items: center;
        gap: 2px;
      }
      .card-due.over {
        color: #ef4444;
      }
      .card-notes {
        font-size: 11px;
        color: var(--text2);
        margin-bottom: 7px;
        line-height: 1.45;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .card-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
      }
      .prio {
        font-size: 11px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        gap: 3px;
        white-space: nowrap;
      }
      .prio-alta {
        background: rgba(239, 68, 68, 0.15);
        color: #ef4444;
      }
      .prio-media {
        background: rgba(245, 158, 11, 0.15);
        color: #f59e0b;
      }
      .prio-baja {
        background: rgba(16, 185, 129, 0.15);
        color: #10b981;
      }
      .card-acts {
        display: flex;
        gap: 3px;
        opacity: 0;
        transition: opacity 0.15s;
      }
      .card:hover .card-acts {
        opacity: 1;
      }
      .ibtn {
        background: var(--bg4);
        border: none;
        border-radius: 4px;
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 12px;
        color: var(--text2);
        transition: all 0.15s;
      }
      .ibtn:hover {
        background: var(--border);
        color: var(--text);
      }
      .ibtn.del:hover {
        background: rgba(248, 81, 73, 0.15);
        color: #f85149;
      }
      .card-id {
        font-size: 9px;
        color: var(--text2);
        opacity: 0.4;
        font-family: monospace;
        margin-top: 5px;
      }
      .col-completada .card {
        opacity: 0.72;
      }
      .col-completada .card:hover {
        opacity: 1;
      }
      .col-completada .card-name {
        text-decoration: line-through;
        color: var(--text2);
      }

      /* ── Modal ── */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.72);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .overlay.open {
        opacity: 1;
        pointer-events: all;
      }
      .modal {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 12px;
        width: 460px;
        max-width: 92vw;
        max-height: 92vh;
        overflow-y: auto;
        transform: translateY(18px) scale(0.97);
        transition: transform 0.2s;
      }
      .overlay.open .modal {
        transform: translateY(0) scale(1);
      }
      .mhead {
        padding: 18px 22px 14px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .mtitle {
        font-size: 15px;
        font-weight: 700;
      }
      .mclose {
        background: none;
        border: none;
        color: var(--text2);
        font-size: 22px;
        cursor: pointer;
        padding: 2px 6px;
        border-radius: 4px;
        line-height: 1;
        transition: all 0.15s;
      }
      .mclose:hover {
        background: var(--bg4);
        color: var(--text);
      }
      .mbody {
        padding: 18px 22px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .mfoot {
        padding: 14px 22px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        align-items: center;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .field label {
        font-size: 11px;
        font-weight: 700;
        color: var(--text2);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .field input,
      .field textarea {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 11px;
        color: var(--text);
        font-size: 13px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s;
        resize: vertical;
      }
      .field input:focus,
      .field textarea:focus {
        border-color: var(--blue);
      }
      .field input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(0.6);
      }
      .row2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .prio-opts {
        display: flex;
        gap: 7px;
      }
      .popt input {
        display: none;
      }
      .popt label {
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        border: 2px solid transparent;
        transition: all 0.15s;
      }
      .popt.alta label {
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
      }
      .popt.media label {
        background: rgba(245, 158, 11, 0.1);
        color: #f59e0b;
      }
      .popt.baja label {
        background: rgba(16, 185, 129, 0.1);
        color: #10b981;
      }
      .popt input:checked + label {
        border-color: currentColor;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.05);
      }
      .swatches {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }
      .swatch {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        cursor: pointer;
        border: 2.5px solid transparent;
        transition: all 0.15s;
        position: relative;
        flex-shrink: 0;
      }
      .swatch:hover {
        transform: scale(1.18);
      }
      .swatch.sel {
        border-color: #fff;
        transform: scale(1.18);
      }
      .swatch.sel::after {
        content: "✓";
        position: absolute;
        inset: 0;
        text-align: center;
        line-height: 21px;
        font-size: 11px;
        color: #fff;
        font-weight: 800;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      }
      .btn {
        padding: 7px 16px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        border: none;
        transition: all 0.15s;
      }
      .btn-p {
        background: var(--blue);
        color: #fff;
      }
      .btn-p:hover {
        background: #1d6fe8;
      }
      .btn-s {
        background: var(--bg3);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn-s:hover {
        background: var(--bg4);
      }
      .btn-d {
        background: rgba(248, 81, 73, 0.12);
        color: #f85149;
        border: 1px solid rgba(248, 81, 73, 0.3);
        margin-right: auto;
      }
      .btn-d:hover {
        background: #f85149;
        color: #fff;
      }

      /* ── Toasts ── */
      .toasts {
        position: fixed;
        bottom: 22px;
        right: 22px;
        display: flex;
        flex-direction: column;
        gap: 7px;
        z-index: 9999;
      }
      .toast {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
        min-width: 220px;
        animation: tin 0.22s ease;
      }
      .toast.ok {
        border-left: 3px solid #10b981;
      }
      .toast.err {
        border-left: 3px solid #ef4444;
      }
      .toast.inf {
        border-left: 3px solid var(--blue);
      }
      @keyframes tin {
        from {
          transform: translateX(110%);
          opacity: 0;
        }
        to {
          transform: none;
          opacity: 1;
        }
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4d555e;
      }

      /* ── Filter bar ── */
      .filterbar {
        display: flex;
        gap: 7px;
        padding: 0 20px 0;
        flex-shrink: 0;
        background: var(--bg);
        padding-bottom: 4px;
      }
      .fchip {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 4px 12px;
        font-size: 12px;
        color: var(--text2);
        cursor: pointer;
        transition: all 0.15s;
      }
      .fchip:hover,
      .fchip.active {
        background: var(--bg3);
        color: var(--text);
        border-color: var(--blue);
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="logo">📌 <span>Task</span>Board</div>
      <div class="search-wrap">
        <input
          type="text"
          id="search"
          placeholder="Buscar tareas…"
          oninput="onSearch(this.value)"
        />
      </div>
      <div class="stats">
        <span class="badge badge-total" id="st-total">0 tareas</span>
        <span class="badge badge-curso" id="st-curso">⚡ 0</span>
        <span class="badge badge-done" id="st-done">✅ 0</span>
      </div>
      <button class="btn-new" onclick="openModal()">+ Nueva tarea</button>
    </nav>

    <!-- Filter chips -->
    <div class="filterbar" id="filterbar">
      <span
        class="fchip active"
        data-filter="all"
        onclick="setFilter('all', this)"
        >Todas</span
      >
      <span class="fchip" data-filter="alta" onclick="setFilter('alta', this)"
        >🔴 Alta</span
      >
      <span class="fchip" data-filter="media" onclick="setFilter('media', this)"
        >🟡 Media</span
      >
      <span class="fchip" data-filter="baja" onclick="setFilter('baja', this)"
        >🟢 Baja</span
      >
    </div>

    <!-- Board -->
    <div class="board">
      <div class="column col-pendiente">
        <div class="col-head">
          <span class="col-icon">📋</span>
          <span class="col-title">PENDIENTE</span>
          <span class="col-count" id="cnt-pendiente">0</span>
        </div>
        <div class="col-body" id="col-pendiente" data-status="pendiente"></div>
        <button class="col-add" onclick="openModal(null, 'pendiente')">
          + Añadir tarea
        </button>
      </div>
      <div class="column col-en_curso">
        <div class="col-head">
          <span class="col-icon">⚡</span>
          <span class="col-title">EN CURSO</span>
          <span class="col-count" id="cnt-en_curso">0</span>
        </div>
        <div class="col-body" id="col-en_curso" data-status="en_curso"></div>
        <button class="col-add" onclick="openModal(null, 'en_curso')">
          + Añadir tarea
        </button>
      </div>
      <div class="column col-completada">
        <div class="col-head">
          <span class="col-icon">✅</span>
          <span class="col-title">COMPLETADA</span>
          <span class="col-count" id="cnt-completada">0</span>
        </div>
        <div
          class="col-body"
          id="col-completada"
          data-status="completada"
        ></div>
        <button class="col-add" onclick="openModal(null, 'completada')">
          + Añadir tarea
        </button>
      </div>
    </div>

    <!-- Modal -->
    <div class="overlay" id="overlay" onclick="bgClick(event)">
      <div class="modal">
        <div class="mhead">
          <span class="mtitle" id="mtitle">Nueva Tarea</span>
          <button class="mclose" onclick="closeModal()">×</button>
        </div>
        <div class="mbody">
          <div class="field">
            <label>Nombre *</label>
            <input type="text" id="f-name" placeholder="Nombre de la tarea…" />
          </div>
          <div class="row2">
            <div class="field">
              <label>Tema / Categoría</label>
              <input type="text" id="f-topic" placeholder="ej: Frontend" />
            </div>
            <div class="field">
              <label>Fecha límite</label>
              <input type="date" id="f-due" />
            </div>
          </div>
          <div class="field">
            <label>Notas</label>
            <textarea
              id="f-notes"
              rows="3"
              placeholder="Descripción adicional…"
            ></textarea>
          </div>
          <div class="field">
            <label>Prioridad</label>
            <div class="prio-opts">
              <div class="popt alta">
                <input type="radio" name="prio" id="p-alta" value="alta" />
                <label for="p-alta">🔴 Alta</label>
              </div>
              <div class="popt media">
                <input
                  type="radio"
                  name="prio"
                  id="p-media"
                  value="media"
                  checked
                />
                <label for="p-media">🟡 Media</label>
              </div>
              <div class="popt baja">
                <input type="radio" name="prio" id="p-baja" value="baja" />
                <label for="p-baja">🟢 Baja</label>
              </div>
            </div>
          </div>
          <div class="field">
            <label>Color de la tarjeta</label>
            <div class="swatches" id="swatches"></div>
          </div>
        </div>
        <div class="mfoot">
          <button
            class="btn btn-d"
            id="btn-del"
            style="display: none"
            onclick="doDelete()"
          >
            🗑 Eliminar
          </button>
          <button class="btn btn-s" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-p" onclick="submit()">Guardar</button>
        </div>
      </div>
    </div>

    <!-- Toasts -->
    <div class="toasts" id="toasts"></div>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script>
      // ── State ─────────────────────────────────────────────────────────────────────
      let tasks = [],
        editId = null,
        selColor = "#3b82f6";
      let search = "",
        filter = "all",
        defStatus = "pendiente";

      const PALETTE = [
        "#ef4444",
        "#f97316",
        "#f59e0b",
        "#84cc16",
        "#10b981",
        "#06b6d4",
        "#3b82f6",
        "#6366f1",
        "#8b5cf6",
        "#ec4899",
        "#14b8a6",
        "#eab308",
      ];
      const SLABELS = {
        pendiente: "📋 Pendiente",
        en_curso: "⚡ En Curso",
        completada: "✅ Completada",
      };
      const PICONS = { alta: "🔴", media: "🟡", baja: "🟢" };

      // ── Boot ──────────────────────────────────────────────────────────────────────
      async function boot() {
        buildSwatches();
        await fetchTasks();
        setupSortable();
        document.getElementById("f-name").addEventListener("keydown", (e) => {
          if (e.key === "Enter") submit();
        });
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") closeModal();
          if ((e.ctrlKey || e.metaKey) && e.key === "n") {
            e.preventDefault();
            openModal();
          }
        });
      }

      function buildSwatches() {
        document.getElementById("swatches").innerHTML = PALETTE.map(
          (c) =>
            `<div class="swatch${c === selColor ? " sel" : ""}" style="background:${c}"
         data-c="${c}" onclick="pickColor('${c}')" title="${c}"></div>`,
        ).join("");
      }

      function pickColor(c) {
        selColor = c;
        document
          .querySelectorAll(".swatch")
          .forEach((s) => s.classList.toggle("sel", s.dataset.c === c));
      }

      // ── API ───────────────────────────────────────────────────────────────────────
      async function fetchTasks() {
        const r = await fetch("/api/tasks");
        tasks = await r.json();
        render();
      }
      async function apiPost(d) {
        const r = await fetch("/api/tasks", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(d),
        });
        if (!r.ok) throw await r.json();
        return r.json();
      }
      async function apiPut(id, d) {
        const r = await fetch("/api/tasks/" + id, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(d),
        });
        if (!r.ok) throw await r.json();
        return r.json();
      }
      async function apiDel(id) {
        const r = await fetch("/api/tasks/" + id, { method: "DELETE" });
        if (!r.ok) throw await r.json();
      }

      // ── Render ────────────────────────────────────────────────────────────────────
      function matches(t) {
        if (filter !== "all" && t.priority !== filter) return false;
        if (!search) return true;
        const q = search.toLowerCase();
        return (
          t.name.toLowerCase().includes(q) ||
          t.topic.toLowerCase().includes(q) ||
          (t.notes || "").toLowerCase().includes(q)
        );
      }

      function render() {
        let total = 0,
          curso = 0,
          done = 0;
        ["pendiente", "en_curso", "completada"].forEach((st) => {
          const col = document.getElementById("col-" + st);
          const list = tasks.filter((t) => t.status === st && matches(t));
          col.innerHTML = list.length
            ? list.map(cardHtml).join("")
            : '<div class="col-empty">Sin tareas · arrástralas aquí</div>';
          document.getElementById("cnt-" + st).textContent = list.length;
          total += list.length;
          if (st === "en_curso") curso = list.length;
          if (st === "completada") done = list.length;
        });
        document.getElementById("st-total").textContent =
          total + " tarea" + (total !== 1 ? "s" : "");
        document.getElementById("st-curso").textContent = "⚡ " + curso;
        document.getElementById("st-done").textContent = "✅ " + done;
      }

      function cardHtml(t) {
        const due = t.due_date ? fmtDate(t.due_date) : null;
        const over =
          due && new Date(t.due_date) < new Date() && t.status !== "completada";
        return `
  <div class="card" data-id="${t.id}" style="--cc:${t.color || "#3b82f6"}">
    <div class="card-name">${esc(t.name)}</div>
    <div class="card-meta">
      <span class="card-tag">🏷 ${esc(t.topic)}</span>
      ${due ? `<span class="card-due${over ? " over" : ""}">📅 ${due}</span>` : ""}
    </div>
    ${t.notes ? `<div class="card-notes">${esc(t.notes)}</div>` : ""}
    <div class="card-foot">
      <span class="prio prio-${t.priority}">${PICONS[t.priority]} ${t.priority.toUpperCase()}</span>
      <div class="card-acts">
        <button class="ibtn"     onclick="openModal('${t.id}')"       title="Editar">✏️</button>
        <button class="ibtn del" onclick="qDel('${t.id}',event)"     title="Eliminar">🗑️</button>
      </div>
    </div>
    <div class="card-id">#${t.id.slice(0, 8)}</div>
  </div>`;
      }

      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function fmtDate(s) {
        try {
          const [y, m, d] = s.split("-");
          return d + "/" + m + "/" + y;
        } catch {
          return s;
        }
      }

      // ── Drag & Drop ───────────────────────────────────────────────────────────────
      function setupSortable() {
        ["pendiente", "en_curso", "completada"].forEach((st) => {
          new Sortable(document.getElementById("col-" + st), {
            group: "board",
            animation: 200,
            ghostClass: "card-ghost",
            chosenClass: "card-chosen",
            filter: ".col-empty",
            onEnd: async (evt) => {
              const id = evt.item.dataset.id;
              const nst = evt.to.dataset.status;
              if (!id || evt.from === evt.to) return;
              try {
                await apiPut(id, { status: nst });
                toast("Movida a " + SLABELS[nst], "ok");
                await fetchTasks();
              } catch {
                toast("Error al mover", "err");
                await fetchTasks();
              }
            },
          });
        });
      }

      // ── Filters & Search ──────────────────────────────────────────────────────────
      function onSearch(v) {
        search = v.trim();
        render();
      }
      function setFilter(f, el) {
        filter = f;
        document
          .querySelectorAll(".fchip")
          .forEach((c) => c.classList.remove("active"));
        el.classList.add("active");
        render();
      }

      // ── Modal ─────────────────────────────────────────────────────────────────────
      function openModal(id = null, st = "pendiente") {
        editId = id;
        defStatus = st;
        const ov = document.getElementById("overlay");
        document.getElementById("btn-del").style.display = id
          ? "block"
          : "none";
        document.getElementById("mtitle").textContent = id
          ? "✏️ Editar Tarea"
          : "➕ Nueva Tarea";

        if (id) {
          const t = tasks.find((x) => x.id === id);
          if (!t) return;
          document.getElementById("f-name").value = t.name;
          document.getElementById("f-topic").value = t.topic;
          document.getElementById("f-notes").value = t.notes || "";
          document.getElementById("f-due").value = t.due_date || "";
          document.querySelector(
            'input[name="prio"][value="' + t.priority + '"]',
          ).checked = true;
          pickColor(t.color || "#3b82f6");
        } else {
          document.getElementById("f-name").value = "";
          document.getElementById("f-topic").value = "";
          document.getElementById("f-notes").value = "";
          document.getElementById("f-due").value = "";
          document.querySelector('input[name="prio"][value="media"]').checked =
            true;
          pickColor("#3b82f6");
        }
        ov.classList.add("open");
        setTimeout(() => document.getElementById("f-name").focus(), 80);
      }

      function closeModal() {
        document.getElementById("overlay").classList.remove("open");
        editId = null;
      }
      function bgClick(e) {
        if (e.target.id === "overlay") closeModal();
      }

      async function submit() {
        const name = document.getElementById("f-name").value.trim();
        if (!name) {
          const el = document.getElementById("f-name");
          el.style.borderColor = "#ef4444";
          el.focus();
          setTimeout(() => (el.style.borderColor = ""), 1500);
          return;
        }
        const data = {
          name,
          topic: document.getElementById("f-topic").value.trim() || "General",
          notes: document.getElementById("f-notes").value.trim(),
          due_date: document.getElementById("f-due").value,
          priority: document.querySelector('input[name="prio"]:checked').value,
          color: selColor,
        };
        try {
          if (editId) {
            await apiPut(editId, data);
            toast("Tarea actualizada ✓", "ok");
          } else {
            data.status = defStatus;
            await apiPost(data);
            toast("Tarea creada ✓", "ok");
          }
          closeModal();
          await fetchTasks();
        } catch (e) {
          toast(e.error || "Error al guardar", "err");
        }
      }

      async function doDelete() {
        if (!editId) return;
        if (!confirm("¿Eliminar esta tarea? No se puede deshacer.")) return;
        try {
          await apiDel(editId);
          toast("Tarea eliminada", "inf");
          closeModal();
          await fetchTasks();
        } catch {
          toast("Error al eliminar", "err");
        }
      }

      async function qDel(id, e) {
        e.stopPropagation();
        if (!confirm("¿Eliminar esta tarea?")) return;
        try {
          await apiDel(id);
          toast("Tarea eliminada", "inf");
          await fetchTasks();
        } catch {
          toast("Error al eliminar", "err");
        }
      }

      // ── Toast ─────────────────────────────────────────────────────────────────────
      function toast(msg, type = "inf") {
        const ic = { ok: "✅", err: "❌", inf: "ℹ️" };
        const el = Object.assign(document.createElement("div"), {
          className: `toast ${type}`,
          innerHTML: `<span>${ic[type]}</span><span>${msg}</span>`,
        });
        document.getElementById("toasts").appendChild(el);
        setTimeout(() => {
          el.style.opacity = "0";
          el.style.transition = "opacity .4s";
        }, 2700);
        setTimeout(() => el.remove(), 3200);
      }

      boot();
    </script>
  </body>
</html>
